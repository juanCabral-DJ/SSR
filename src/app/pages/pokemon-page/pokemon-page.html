@if(pokemon() === null){
<div class="flex justify-center">
  <h1 class="text-4xl font-bold">Loading...</h1>
</div>
}@else{
@let mypokemon = pokemon()!;

<section class="flex flex-col justify-center">
  <div class="flex justify-center">
    <h1 class="text-4xl font-bold capitalize my-5">{{mypokemon.name}}</h1>
  </div>
</section>

<section class="flex flex-col justify-center items-center w-full">
  <img class="w-64 h-64" width="256px" height="256px"
    [src]="mypokemon.sprites.other?.['official-artwork']?.front_default" [alt]="pokemon()?.name">

  @if(mypokemon.cries.latest !== null){
  <audio controls class="my-10">
    <source [src]="mypokemon.cries.latest" type="audio/wav">
  </audio>
  }
</section>

<section class="flex flex-col justify-center">
  <h2 class="text-2xl font-bold mt-2">Abilities</h2>
  <div class="flex flex-wrap items-center">
    @for (item of mypokemon.abilities; track $index) {
    <span class="mx-2">{{item.ability?.name}}</span>
    }
  </div>
</section>
}
