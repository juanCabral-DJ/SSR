<h1 class="text-3xl">Listado de pokemons</h1>
<h2 class="text-2xl">Pagina actual {{currentpage()}}</h2>

<hr class="my-2">
@if (pokemons().length != 0) {
<app-pokemon-list [pokemons]="pokemons()" />
}@else{
<app-pokemon-list-skeleton />
}

<!--  -->


<div class="flex justify-between mt-4">
  <button [disabled]="currentpage() === 1" [routerLink]="['/pokemons/page', currentpage()! -1]"
    class="mt-2 cursor-pointer">
    Anteriores
  </button>
  <button [disabled]="currentpage() === 34" [routerLink]="['/pokemons/page', currentpage()! +1]"
    class="mt-2 cursor-pointer">
    siguiente
  </button>
</div>
